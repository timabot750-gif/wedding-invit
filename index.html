<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тёма ❤️ Аня — Квест любви</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0b1a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 50%, #1a1130, #0d0b1a);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #0d0b1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.8s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-text {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .splash-sub {
            margin-top: 15px;
            color: #aaa;
            font-size: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        #quest-screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .quest-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.2);
            padding: 30px 20px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .quest-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f7b731, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .quest-progress {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }

        .quest-step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,215,0,0.2);
            transition: all 0.3s;
        }

        .quest-step.active {
            background: #ffd700;
            box-shadow: 0 0 15px #ffd700;
            transform: scale(1.2);
        }

        .quest-step.done {
            background: #ffd700;
            opacity: 0.5;
        }

        .quest-content {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .quest-feedback {
            margin-top: 15px;
            font-size: 1.1rem;
            min-height: 40px;
            padding: 10px;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 350px;
            margin: 10px auto;
        }

        .word-item {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 10px;
            padding: 12px 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .word-item:hover {
            background: rgba(255,215,0,0.15);
            transform: scale(1.05);
        }

        .word-item.found {
            background: rgba(50,255,100,0.2);
            border-color: #44ff88;
            cursor: default;
        }

        .word-item.wrong {
            background: rgba(255,50,50,0.2);
            border-color: #ff4444;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .quest-btn {
            background: linear-gradient(135deg, #f7b731, #fc5c7d);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            margin: 15px 0;
        }

        .quest-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(247, 183, 49, 0.4);
        }

        #timerDisplay {
            color: #ffd700;
            font-size: 1.1rem;
            margin: 10px 0;
        }

        .final-message {
            font-size: 1.2rem;
            line-height: 1.8;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin: 15px 0;
            white-space: pre-line;
        }

        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s linear forwards;
            z-index: 999;
            pointer-events: none;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ===== СТИЛИ ДЛЯ ПАЗЛА ===== */
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 320px;
            margin: 15px auto;
        }

        .puzzle-card {
            background: rgba(255,215,0,0.08);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            padding: 20px 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .puzzle-card:hover {
            background: rgba(255,215,0,0.15);
            transform: scale(1.03);
        }

        .puzzle-card.selected {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .puzzle-card.matched {
            background: rgba(50,255,100,0.2);
            border-color: #44ff88;
            opacity: 0.6;
            cursor: default;
            transform: scale(0.95);
        }

        @media (max-width: 500px) {
            .quest-container { padding: 20px 15px; }
            .word-grid { grid-template-columns: repeat(2, 1fr); }
            .puzzle-card { padding: 15px 8px; font-size: 0.9rem; min-height: 60px; }
        }
    </style>
</head>
<body>
    <div id="starfield"></div>

    <div id="splash">
        <div class="splash-text">Тёма ❤️ Аня</div>
        <div class="splash-sub">1.5 года счастья</div>
    </div>

    <div id="quest-screen">
        <div class="quest-container">
            <div class="quest-title">💫 Квест любви</div>
            <div id="timerDisplay">Загрузка...</div>
            
            <div class="quest-progress" id="questProgress">
                <div class="quest-step active"></div>
                <div class="quest-step"></div>
                <div class="quest-step"></div>
                <div class="quest-step"></div>
                <div class="quest-step"></div>
            </div>

            <div class="quest-content" id="questContent">
                <p style="color:#aaa;">Подготовка сюрприза...</p>
            </div>

            <div class="quest-feedback" id="questFeedback"></div>
        </div>
    </div>

    <script>
        // ===== ДАННЫЕ =====
        const startDate = new Date(2024, 1, 14, 12, 0); // ИЗМЕНИТЬ!
        let currentStep = 0;
        const totalSteps = 5;

        // ===== ЗВЁЗДЫ =====
        function createStars() {
            const field = document.getElementById('starfield');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                field.appendChild(star);
            }
        }
        createStars();

        // ===== ЗАСТАВКА =====
        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('quest-screen').style.display = 'flex';
                startQuest();
            }, 500);
        }, 3000);

        // ===== ТАЙМЕР =====
        function updateTimer() {
            const now = new Date();
            const diff = Math.max(0, now - startDate);
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            document.getElementById('timerDisplay').textContent = 
                `❤️ Вместе ${days} дней ${hours}ч ${minutes}м ${seconds}с`;
        }

        setInterval(updateTimer, 1000);

        // ===== КВЕСТ =====
        function startQuest() {
            showStep(0);
        }

        function showStep(step) {
            currentStep = step;
            const content = document.getElementById('questContent');
            const feedback = document.getElementById('questFeedback');
            feedback.textContent = '';

            document.querySelectorAll('.quest-step').forEach((el, i) => {
                el.classList.remove('active');
                if (i < step) el.classList.add('done');
                if (i === step) el.classList.add('active');
            });

            switch(step) {
                case 0: showWordGame(content); break;
                case 1: showPuzzleGame(content); break;
                case 2: showCodeGame(content); break;
                case 3: showMemoryPuzzle(content); break; // Новый этап
                case 4: showFinal(content); break;
                default: showFinal(content);
            }
        }

        // ===== ЭТАП 1: СЛОВО =====
        function showWordGame(container) {
            const words = ['Счастье', 'Нежность', 'Забота', 'Верность', 'Тепло', 'Уют', 'Радость', 
                          'Мечта', 'Надежда', 'Любовь', 'Гармония', 'Ласка'];
            
            const shuffled = words.sort(() => Math.random() - 0.5);
            
            let html = '<h3>🔍 Найди слово «Любовь»</h3><div class="word-grid">';
            shuffled.forEach(w => {
                html += `<div class="word-item" onclick="checkWord(this, '${w}')">${w}</div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function checkWord(el, word) {
            if (word === 'Любовь') {
                el.classList.add('found');
                document.querySelectorAll('.word-item').forEach(e => e.style.pointerEvents = 'none');
                document.getElementById('questFeedback').textContent = '✅ Нашла! Ты справилась!';
                setTimeout(() => showStep(1), 1500);
            } else {
                el.classList.add('wrong');
                setTimeout(() => el.classList.remove('wrong'), 500);
                document.getElementById('questFeedback').textContent = '❌ Попробуй ещё!';
            }
        }

        // ===== ЭТАП 2: ПАЗЛ =====
        function showPuzzleGame(container) {
            container.innerHTML = `
                <h3>🧩 Нажми на цифры по порядку</h3>
                <p style="color:#aaa;margin:10px;">От 1 до 5</p>
                <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                    ${[1,2,3,4,5].map(n => `
                        <div class="word-item" onclick="clickNumber(this, ${n})" style="font-size:1.5rem;width:60px;">${n}</div>
                    `).join('')}
                </div>
            `;
            window.puzzleNext = 1;
        }

        function clickNumber(el, num) {
            if (num === window.puzzleNext) {
                el.style.background = 'rgba(50,255,100,0.3)';
                el.style.borderColor = '#44ff88';
                el.style.pointerEvents = 'none';
                window.puzzleNext++;
                
                if (window.puzzleNext > 5) {
                    document.getElementById('questFeedback').textContent = '🎉 Отлично! Идём дальше!';
                    setTimeout(() => showStep(2), 1500);
                }
            } else {
                document.getElementById('questFeedback').textContent = `❌ Нажми ${window.puzzleNext}`;
            }
        }

        // ===== ЭТАП 3: КОД =====
        function showCodeGame(container) {
            const a = Math.floor(Math.random() * 30) + 10;
            const b = Math.floor(Math.random() * 20) + 5;
            window.codeAnswer = a + b;
            
            container.innerHTML = `
                <h3>🔐 Реши пример</h3>
                <p style="font-size:2rem;margin:15px;">${a} + ${b} = ?</p>
                <input type="number" id="codeInput" style="padding:10px;font-size:1.2rem;border-radius:10px;border:none;text-align:center;width:150px;">
                <br>
                <button class="quest-btn" onclick="checkCode()">Проверить</button>
            `;
        }

        function checkCode() {
            const input = document.getElementById('codeInput');
            if (parseInt(input.value) === window.codeAnswer) {
                document.getElementById('questFeedback').textContent = '✅ Верно! Код принят!';
                setTimeout(() => showStep(3), 1500);
            } else {
                document.getElementById('questFeedback').textContent = '❌ Неправильно, попробуй ещё';
            }
        }

        // ===== ЭТАП 4: СОБЕРИ ПАЗЛ ИЗ ВОСПОМИНАНИЙ (НОВЫЙ) =====
        function showMemoryPuzzle(container) {
            // Создаем пары "вопрос-ответ" из ваших воспоминаний
            const pairs = [
                { q: '💕 Где мы познакомились?', a: 'На учёбе/работе' },
                { q: '🎂 Когда у Ани день рождения?', a: 'Твоя дата' },
                { q: '🌍 Куда мы хотим поехать вместе?', a: 'На море/в путешествие' },
                { q: '🎵 Наша любимая песня?', a: 'Твоя любимая' },
                { q: '🍕 Наше любимое блюдо?', a: 'Пицца/суши' },
                { q: '💑 Сколько мы вместе?', a: '1.5 года' }
            ];
            
            // Перемешиваем и берем 4 пары
            const shuffledPairs = pairs.sort(() => Math.random() - 0.5).slice(0, 4);
            
            // Создаем карточки: вопросы и ответы
            let cards = [];
            shuffledPairs.forEach((pair, index) => {
                cards.push({ id: `q${index}`, text: pair.q, pairId: index, type: 'q' });
                cards.push({ id: `a${index}`, text: pair.a, pairId: index, type: 'a' });
            });
            
            // Перемешиваем карточки
            cards = cards.sort(() => Math.random() - 0.5);
            
            let html = `
                <h3>🧩 Собери пары воспоминаний</h3>
                <p style="color:#aaa;margin:10px;">Найди пару для каждого вопроса</p>
                <div class="puzzle-grid">
            `;
            
            cards.forEach(card => {
                html += `
                    <div class="puzzle-card" data-pair="${card.pairId}" data-type="${card.type}" onclick="selectCard(this)">
                        ${card.text}
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
            
            window.selectedCard = null;
            window.matchedPairs = 0;
            window.totalPairs = 4;
        }

        function selectCard(el) {
            if (el.classList.contains('matched')) return;
            
            // Если уже выбрана карточка
            if (window.selectedCard) {
                // Если это та же карточка - отменяем выбор
                if (window.selectedCard === el) {
                    el.classList.remove('selected');
                    window.selectedCard = null;
                    return;
                }
                
                // Проверяем, составляют ли они пару
                const pair1 = window.selectedCard.dataset.pair;
                const pair2 = el.dataset.pair;
                const type1 = window.selectedCard.dataset.type;
                const type2 = el.dataset.type;
                
                // Проверяем: одна карточка вопрос, другая ответ, и у них одинаковый pairId
                if (pair1 === pair2 && type1 !== type2) {
                    // Правильно!
                    window.selectedCard.classList.add('matched');
                    el.classList.add('matched');
                    window.selectedCard.classList.remove('selected');
                    
                    window.matchedPairs++;
                    document.getElementById('questFeedback').textContent = `✅ Нашла! Осталось: ${window.totalPairs - window.matchedPairs}`;
                    
                    window.selectedCard = null;
                    
                    if (window.matchedPairs === window.totalPairs) {
                        document.getElementById('questFeedback').textContent = '🎉 Все пары собраны! Ты справилась!';
                        setTimeout(() => showStep(4), 1500);
                    }
                } else {
                    // Неправильно
                    window.selectedCard.classList.remove('selected');
                    document.getElementById('questFeedback').textContent = '❌ Это не пара, попробуй ещё';
                    window.selectedCard = null;
                }
            } else {
                // Выбираем карточку
                el.classList.add('selected');
                window.selectedCard = el;
                document.getElementById('questFeedback').textContent = 'Теперь выбери пару для этой карточки';
            }
        }

        // ===== ЭТАП 5: ФИНАЛ =====
        function showFinal(container) {
            // Конфетти
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + '%';
                conf.style.background = ['#ffd700','#fc5c7d','#f7b731','#44ff88','#ff6b6b'][Math.floor(Math.random()*5)];
                conf.style.width = (Math.random() * 8 + 5) + 'px';
                conf.style.height = conf.style.width;
                conf.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
            
            container.innerHTML = `
                <h2 style="color:#ffd700;font-size:2rem;">💕 Моя любимая Аня! 💕</h2>
                <div class="final-message">
                    Полтора года назад я встретил тебя и моя жизнь изменилась навсегда.
                    
                    Ты — самый дорогой человек в моей жизни. С тобой каждый день становится праздником, 
                    каждая минута — счастьем, каждое мгновение — бесценным воспоминанием.
                    
                    Спасибо тебе за твою улыбку, за твою доброту, за то, что ты есть.
                    
                    Я люблю тебя больше всего на свете! ❤️
                    
                    Твой Тёма
                </div>
                <div style="font-size:3rem;animation:pulse 1.5s infinite;">💖</div>
            `;
        }
    </script>
</body>
</html>
